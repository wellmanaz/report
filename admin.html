<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex">
<title>Crew View — Andersen Springs HOA</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
      integrity="sha512-h9FcoyWjHcOcmEVkxOfTLnmZFWIH0iZhZT1H2TbOq55xssQGEJHEaIm+PgoUaZbRvQTNTluNOEfb1ZRy6D3BOw=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<style>
  :root{
    --bg:#FAF7F2; --card:#FFFFFF; --ink:#26211A; --ink-soft:#6E6357;
    --line:#E5DDD0; --accent:#4A7C59; --accent-deep:#3A6347; --clay:#C0653A;
    --inproc:#E6A700; --done:#4A7C59;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.45;
  }
  button{font-family:inherit;cursor:pointer;}

  /* ---- Login ---- */
  #login{
    position:fixed;inset:0;z-index:50;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:center;
  }
  #login .eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-deep);font-weight:600;}
  #login h1{font-size:24px;font-weight:700;margin:6px 0 20px;}
  #login input{
    width:100%;max-width:320px;border:1px solid var(--line);border-radius:10px;
    padding:14px;font-size:17px;text-align:center;background:#FDFCFA;color:var(--ink);
  }
  #login input:focus{outline:2px solid var(--accent);border-color:transparent;}
  #login button{
    width:100%;max-width:320px;margin-top:12px;border:none;border-radius:12px;
    background:var(--accent);color:#fff;padding:15px;font-size:17px;font-weight:650;
  }
  #login-err{color:var(--clay);font-size:14px;margin-top:12px;min-height:18px;}
  #login .hint{color:var(--ink-soft);font-size:13px;margin-top:18px;}

  /* ---- App ---- */
  #app{display:none;height:100%;flex-direction:column;}
  #topbar{
    flex:none;display:flex;align-items:center;gap:10px;
    padding:10px 14px;background:var(--card);border-bottom:1px solid var(--line);
  }
  #topbar .title{font-weight:700;font-size:15px;}
  #topbar .who{font-size:12px;color:var(--ink-soft);}
  #topbar .spacer{flex:1;}
  .toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);}
  #signout{background:none;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px;color:var(--ink);}
  #map{flex:1;}
  .legend{
    position:absolute;left:10px;bottom:10px;z-index:400;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  .legend .row{display:flex;align-items:center;gap:6px;margin:3px 0;}
  .legend label.row{cursor:pointer;}
  .legend input{margin:0;width:15px;height:15px;}
  .legend .always{color:var(--ink-soft);font-size:11px;}
  .dot{width:11px;height:11px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.15);}
  .dot.pulse{animation:upulse 1.2s ease-out infinite;}

  /* Pulsing urgent map marker (divIcon) */
  .urgent-marker{background:transparent!important;border:0!important;}
  .urgent-pin{
    width:18px;height:18px;border-radius:50%;
    background:#E11900;border:2px solid #fff;
    box-shadow:0 0 0 0 rgba(225,25,0,.65);
    animation:upulse 1.2s ease-out infinite;
  }
  @keyframes upulse{
    0%{box-shadow:0 0 0 0 rgba(225,25,0,.65);}
    70%{box-shadow:0 0 0 16px rgba(225,25,0,0);}
    100%{box-shadow:0 0 0 0 rgba(225,25,0,0);}
  }
  @media (prefers-reduced-motion: reduce){ .urgent-pin,.dot.pulse,.bundle-pin.pulse-red{animation:none;} }

  /* Bundle map marker (count badge) */
  .bundle-marker{background:transparent!important;border:0!important;}
  .bundle-pin{
    width:28px;height:28px;border-radius:50%;color:#fff;font-weight:700;font-size:13px;
    border:2px solid #fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 5px rgba(0,0,0,.4);
  }
  .bundle-pin.pulse-red{animation:upulse 1.2s ease-out infinite;}

  /* Bundle detail member list */
  .bmember{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .bmember input{width:18px;height:18px;flex:none;}
  .bthumb{width:46px;height:46px;border-radius:8px;object-fit:cover;flex:none;cursor:zoom-in;}
  .btext{min-width:0;flex:1;}
  .bdesc{font-size:14px;color:var(--ink);}
  .bmeta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  #d-bundle textarea{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;
    font-size:15px;font-family:inherit;margin-top:12px;min-height:60px;resize:vertical;background:#FDFCFA;
  }
  #d-bundle .pill{display:inline-block;}

  /* ---- Detail sheet ---- */
  #scrim{display:none;position:fixed;inset:0;z-index:600;background:rgba(38,33,26,.45);}
  #scrim.show{display:block;}
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:601;background:var(--card);
    border-radius:18px 18px 0 0;padding:16px 16px 24px;transform:translateY(100%);
    transition:transform .22s ease;max-height:85vh;overflow:auto;
    box-shadow:0 -8px 30px rgba(0,0,0,.22);
  }
  #sheet.show{transform:translateY(0);}
  #sheet .grab{width:40px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 14px;}
  #sheet .pill{display:inline-block;font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;color:#fff;}
  #sheet img{width:100%;border-radius:12px;margin:12px 0;display:block;}
  #sheet .desc{font-size:16px;margin:6px 0;}
  #sheet .meta{font-size:13px;color:var(--ink-soft);margin:2px 0;}
  #sheet textarea{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;
    font-size:15px;font-family:inherit;margin-top:12px;min-height:64px;resize:vertical;background:#FDFCFA;
  }
  .actions{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .actions button{border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:650;color:#fff;}
  .btn-start{background:var(--inproc);}
  .btn-done{background:var(--accent);}
  .btn-reopen{background:none;border:1px solid var(--line)!important;color:var(--ink);}
  .btn-cancel{background:#E5DDD0;color:var(--ink);}

  /* ---- Snackbar ---- */
  #snack{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120%);
    z-index:700;background:#26211A;color:#fff;border-radius:12px;padding:12px 16px;
    display:flex;align-items:center;gap:16px;font-size:14px;
    opacity:0;visibility:hidden;pointer-events:none;
    transition:transform .2s ease, opacity .2s ease, visibility .2s;
    box-shadow:0 6px 20px rgba(0,0,0,.3);max-width:90vw;
  }
  #snack.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible;pointer-events:auto;}
  #snack button{background:none;border:none;color:#FFD27A;font-weight:700;font-size:14px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="eyebrow">Andersen Springs HOA</div>
  <h1>Crew View</h1>
  <input id="pw" type="password" inputmode="text" autocomplete="off" placeholder="Enter password" autofocus>
  <button id="pw-go">Enter</button>
  <div id="login-err"></div>
  <div class="hint">Vendor access only.</div>
</div>

<!-- APP -->
<div id="app">
  <div id="topbar">
    <div>
      <div class="title">Open issues</div>
      <div class="who" id="who"></div>
    </div>
    <div class="spacer"></div>
    <button id="signout">Sign out</button>
  </div>
  <div id="map"></div>
  <div class="legend">
    <div class="row"><span class="dot pulse" style="background:#E11900"></span> Urgent <span class="always">always on</span></div>
    <label class="row"><input type="checkbox" id="f-open" checked><span class="dot" style="background:#C0653A"></span> Open</label>
    <label class="row"><input type="checkbox" id="f-inproc" checked><span class="dot" style="background:#E6A700"></span> In Process</label>
    <label class="row"><input type="checkbox" id="f-complete"><span class="dot" style="background:#4A7C59"></span> Complete</label>
  </div>
</div>

<!-- DETAIL SHEET -->
<div id="scrim"></div>
<div id="sheet">
  <div class="grab"></div>
  <div id="d-single">
    <span class="pill" id="d-status"></span>
    <img id="d-photo" alt="Reported issue photo" style="display:none">
    <p class="desc" id="d-desc"></p>
    <p class="meta" id="d-area"></p>
    <p class="meta" id="d-date"></p>
    <textarea id="d-note" placeholder="Resolution note (optional) — emailed to the reporter if entered"></textarea>
    <div class="actions" id="d-actions"></div>
  </div>
  <div id="d-bundle" style="display:none"></div>
</div>

<div id="snack"><span id="snack-msg"></span><button id="snack-undo">Undo</button></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"
        integrity="sha512-puJW3E/qXDqYp9IfhAI54BJEaWIfloJ7JWs7OeD5i6ruC9JZL1gERT1wjtwXFlh7CjE7ZJ+/vcRZRkIYIb6p4g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
/* ============ CONFIG ============ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx90aoWcNhh9DEE7hdmpXgm_yiOclc_D5x_UC_rADWbEtzQ7nqWWhrJAVWFH4dkSa6n/exec";
const NEIGHBORHOOD_CENTER = [33.3160, -111.8720];
const HOME_URL = "index.html";   // where a bad password bounces to
const PW_KEY = "hoa_admin_pw";
/* ================================ */

const $ = id => document.getElementById(id);
let map, markersLayer, vendorName = "", allReports = [], current = null, currentBundle = null, snackTimer = null, pwFails = 0;

const colorFor = r => r.urgent ? "#E11900"
  : r.status === "Complete" ? "#4A7C59"
  : r.status === "In Process" ? "#E6A700" : "#C0653A";
const getPw = () => sessionStorage.getItem(PW_KEY) || "";
const setPw = v => sessionStorage.setItem(PW_KEY, v);
const clearPw = () => sessionStorage.removeItem(PW_KEY);

async function api(payload){
  const res = await fetch(SCRIPT_URL, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
  return res.json();
}

/* ---------- Auth ---------- */
function showLogin(msg){
  $("app").style.display = "none";
  $("login").style.display = "flex";
  $("login-err").textContent = msg || "";
  $("pw").value = "";
  $("pw").focus();
}
function showApp(){
  $("login").style.display = "none";
  $("app").style.display = "flex";
  if (!map) initMap();
  setTimeout(() => map.invalidateSize(), 100);
}

$("pw-go").addEventListener("click", tryLogin);
$("pw").addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });

async function tryLogin(){
  const pw = $("pw").value.trim();
  if (!pw) return;
  setPw(pw);
  $("login-err").textContent = "Checking…";
  await loadReports(true);
}

$("signout").addEventListener("click", () => { clearPw(); showLogin(""); });

/* ---------- Map ---------- */
function initMap(){
  map = L.map("map").setView(NEIGHBORHOOD_CENTER, 16);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19, attribution: "&copy; OpenStreetMap"
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
  // Center on the crew's position if allowed (doesn't block rendering).
  if (navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      p => map.setView([p.coords.latitude, p.coords.longitude], 16),
      () => {}, { enableHighAccuracy:true, timeout:8000 }
    );
  }
}

/* Which reports to show, per the legend filter checkboxes. Urgent always shows. */
function isVisible(r){
  if (r.urgent) return true;
  if (r.status === "Complete")   return $("f-complete").checked;
  if (r.status === "In Process") return $("f-inproc").checked;
  return $("f-open").checked;                       // blank status = Open
}

function singleMarker(r){
  return r.urgent
    ? L.marker([r.lat, r.lng], { icon: L.divIcon({
        className: "urgent-marker", html: '<div class="urgent-pin"></div>',
        iconSize: [18, 18], iconAnchor: [9, 9] }) })
    : L.circleMarker([r.lat, r.lng], {
        radius: 10, fillColor: colorFor(r), color: "#fff", weight: 2, fillOpacity: 0.95 });
}

/* Aggregate status / color across a bundle's members. */
function aggStatus(members){
  if (members.every(m => m.status === "Complete")) return "Complete";
  if (members.some(m => m.status === "In Process")) return "In Process";
  return "";   // open
}
function bundleColor(members){
  if (members.some(m => m.urgent)) return "#E11900";
  const s = aggStatus(members);
  return s === "Complete" ? "#4A7C59" : s === "In Process" ? "#E6A700" : "#C0653A";
}
function bundlePrimary(members){
  return members.slice().sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""))[0];
}
function bundleIcon(members){
  const cls = "bundle-pin" + (members.some(m => m.urgent) ? " pulse-red" : "");
  return L.divIcon({ className: "bundle-marker", iconSize: [28, 28], iconAnchor: [14, 14],
    html: '<div class="' + cls + '" style="background:' + bundleColor(members) + '">' + members.length + '</div>' });
}

function drawMarkers(fit){
  markersLayer.clearLayers();
  const pts = [];

  // Group reports: real bundles (bundleId shared by 2+) vs. singletons.
  const groups = {};
  allReports.forEach(r => {
    const k = r.bundleId ? ("b:" + r.bundleId) : ("s:" + r.id);
    (groups[k] || (groups[k] = [])).push(r);
  });

  Object.keys(groups).forEach(k => {
    const members = groups[k];
    const visible = members.filter(isVisible);
    if (!visible.length) return;

    if (k.charAt(0) === "b" && members.length > 1) {
      const primary = bundlePrimary(members);
      const mk = L.marker([primary.lat, primary.lng], { icon: bundleIcon(members) });
      mk.addTo(markersLayer);
      mk.on("click", () => openBundleDetail(members));
      pts.push([primary.lat, primary.lng]);
    } else {
      // singleton (or a bundle reduced to one member after unbundling)
      members.forEach(r => {
        if (!isVisible(r)) return;
        const mk = singleMarker(r);
        mk.addTo(markersLayer);
        mk.on("click", () => openDetail(r));
        pts.push([r.lat, r.lng]);
      });
    }
  });

  if (fit && pts.length) { try { map.fitBounds(pts, { padding:[40,40], maxZoom:17 }); } catch(e){} }
}

["f-open", "f-inproc", "f-complete"].forEach(id =>
  $(id).addEventListener("change", () => drawMarkers(false)));

/* ---------- Load ---------- */
async function loadReports(fromLogin, refit){
  let out;
  try { out = await api({ action:"adminList", password:getPw(), includeCompleted: true }); }
  catch(e){ if (fromLogin) $("login-err").textContent = "Network error — try again."; else toast("Network error."); return; }

  if (!out.ok){
    if (out.auth === false){
      clearPw();
      if (fromLogin){
        pwFails++;
        if (pwFails >= 3){ window.location.href = HOME_URL; return; }   // 3 strikes -> main screen
        showLogin("Incorrect password. " + (3 - pwFails) + (pwFails === 2 ? " try left." : " tries left."));
      } else {
        showLogin("");
      }
      return;
    }
    if (fromLogin) $("login-err").textContent = out.error || "Error."; else toast(out.error || "Error.");
    return;
  }
  pwFails = 0;
  vendorName = out.vendor || "";
  $("who").textContent = vendorName ? ("Signed in as " + vendorName) : "";
  showApp();
  allReports = out.reports || [];
  drawMarkers(refit !== false);
}

/* ---------- Detail sheet ---------- */
function openDetail(r){
  current = r; currentBundle = null;
  $("d-single").style.display = "";
  $("d-bundle").style.display = "none";
  $("d-status").textContent = (r.urgent ? "⚠ " : "") + (r.status || "Open");
  $("d-status").style.background = colorFor(r);
  if (r.photo){
    $("d-photo").src = r.photo;
    $("d-photo").style.display = "block";
    $("d-photo").style.cursor = "zoom-in";
    $("d-photo").onclick = () => { if (r.photoFull) window.open(r.photoFull, "_blank", "noopener"); };
  } else {
    $("d-photo").style.display = "none";
    $("d-photo").removeAttribute("src");
    $("d-photo").onclick = null;
  }
  $("d-desc").textContent = r.description || "(no description)";
  $("d-area").textContent = r.area ? ("📍 " + r.area) : "";
  $("d-date").textContent = r.timestamp ? ("Reported " + new Date(r.timestamp).toLocaleString()) : "";
  $("d-note").value = "";

  const actions = $("d-actions");
  actions.innerHTML = "";
  if (r.status !== "In Process" && r.status !== "Complete")
    actions.appendChild(mkBtn("Mark In Process", "btn-start", () => update("In Process")));
  if (r.status !== "Complete")
    actions.appendChild(mkBtn("Mark Complete", "btn-done", () => update("Complete")));
  if (r.status === "Complete")
    actions.appendChild(mkBtn("Reopen", "btn-reopen", () => update("In Process")));
  actions.appendChild(mkBtn("Close", "btn-cancel", closeDetail));

  $("scrim").classList.add("show");
  $("sheet").classList.add("show");
  // Push a history entry so the device Back button closes the panel (not the page).
  if (!(history.state && history.state.detail)) history.pushState({ detail: true }, "");
}
function mkBtn(label, cls, fn){
  const b = document.createElement("button");
  b.textContent = label; b.className = cls; b.addEventListener("click", fn);
  return b;
}
function hideSheet(){
  $("scrim").classList.remove("show");
  $("sheet").classList.remove("show");
  current = null; currentBundle = null;
}
/* User-initiated close: pop our pushed history entry (which fires popstate ->
   hideSheet), so the back-stack stays in sync. */
function closeDetail(){
  if (history.state && history.state.detail) history.back();
  else hideSheet();
}
$("scrim").addEventListener("click", closeDetail);
/* Device / browser Back while the panel is open just closes the panel. */
window.addEventListener("popstate", () => { if ($("sheet").classList.contains("show")) hideSheet(); });

/* ---------- Update ---------- */
async function update(newStatus){
  if (!current) return;
  const id = current.id, wasComplete = newStatus === "Complete";
  const note = $("d-note").value.trim();
  closeDetail();
  let out;
  try { out = await api({ action:"adminUpdate", password:getPw(), id:id, status:newStatus, note:note }); }
  catch(e){ toast("Network error — not saved."); return; }
  if (!out.ok){
    if (out.auth === false){ clearPw(); showLogin("Session expired — sign in again."); return; }
    toast(out.error || "Couldn't save."); return;
  }
  await loadReports(false, false);
  if (wasComplete) snack("Completed ✓", id);
  else toast(newStatus === "In Process" ? "Marked In Process." : "Updated.");
}

/* ---------- Bundle detail ---------- */
function escapeHtml(s){
  return String(s == null ? "" : s).replace(/[&<>"]/g,
    c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
}

function openBundleDetail(members){
  currentBundle = members; current = null;
  $("d-single").style.display = "none";
  const b = $("d-bundle");
  b.style.display = "block";

  const bundleId = (members.find(m => m.bundleId) || {}).bundleId || "";
  const agg = aggStatus(members);
  const urgent = members.some(m => m.urgent);

  b.innerHTML =
    '<span class="pill" style="background:' + bundleColor(members) + '">' +
      (urgent ? "⚠ " : "") + members.length + " bundled reports" + (agg ? " · " + escapeHtml(agg) : " · Open") +
    '</span>' +
    '<p class="meta" style="margin-top:8px">Same issue, reported by several people. Uncheck one to split it out.</p>' +
    '<div id="b-members"></div>' +
    '<textarea id="b-note" placeholder="Resolution note (optional) — emailed to each reporter"></textarea>' +
    '<div class="actions" id="b-actions"></div>';

  const list = b.querySelector("#b-members");
  members.forEach(m => {
    const row = document.createElement("label");
    row.className = "bmember";
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = true;
    cb.addEventListener("change", () => { if (!cb.checked) unbundle(m.id); });
    row.appendChild(cb);
    if (m.photo){
      const img = document.createElement("img");
      img.src = m.photo; img.className = "bthumb";
      img.addEventListener("click", e => {
        e.preventDefault();
        if (m.photoFull) window.open(m.photoFull, "_blank", "noopener");
      });
      row.appendChild(img);
    }
    const txt = document.createElement("div");
    txt.className = "btext";
    txt.innerHTML =
      '<div class="bdesc">' + escapeHtml(m.description || "(no description)") + '</div>' +
      '<div class="bmeta">' + (m.area ? "📍 " + escapeHtml(m.area) + " · " : "") +
        (m.timestamp ? new Date(m.timestamp).toLocaleDateString() : "") + '</div>';
    row.appendChild(txt);
    list.appendChild(row);
  });

  const actions = b.querySelector("#b-actions");
  const allComplete = members.every(m => m.status === "Complete");
  const allInProc   = members.every(m => m.status === "In Process");
  if (!allComplete && !allInProc)
    actions.appendChild(mkBtn("Mark all In Process", "btn-start", () => updateBundle(bundleId, "In Process")));
  if (!allComplete)
    actions.appendChild(mkBtn("Mark all Complete", "btn-done", () => updateBundle(bundleId, "Complete")));
  if (allComplete)
    actions.appendChild(mkBtn("Reopen all", "btn-reopen", () => updateBundle(bundleId, "In Process")));
  actions.appendChild(mkBtn("Close", "btn-cancel", closeDetail));

  $("scrim").classList.add("show");
  $("sheet").classList.add("show");
  if (!(history.state && history.state.detail)) history.pushState({ detail: true }, "");
}

async function updateBundle(bundleId, newStatus){
  if (!bundleId) return;
  const note = ($("b-note") && $("b-note").value.trim()) || "";
  const wasComplete = newStatus === "Complete";
  closeDetail();
  let out;
  try { out = await api({ action:"adminUpdate", password:getPw(), bundleId:bundleId, status:newStatus, note:note }); }
  catch(e){ toast("Network error — not saved."); return; }
  if (!out.ok){
    if (out.auth === false){ clearPw(); showLogin("Session expired — sign in again."); return; }
    toast(out.error || "Couldn't save."); return;
  }
  await loadReports(false, false);
  toast(wasComplete ? "Bundle completed ✓" : (newStatus === "In Process" ? "Bundle marked In Process." : "Updated."));
}

async function unbundle(id){
  let out;
  try { out = await api({ action:"adminUnbundle", password:getPw(), id:id }); }
  catch(e){ toast("Network error."); return; }
  if (!out.ok){
    if (out.auth === false){ clearPw(); showLogin("Session expired — sign in again."); return; }
    toast(out.error || "Couldn't unbundle."); return;
  }
  closeDetail();
  await loadReports(false, false);
  toast("Removed from bundle.");
}

/* ---------- Snackbar / toast ---------- */
function snack(msg, undoId){
  $("snack-msg").textContent = msg;
  $("snack-undo").style.display = undoId ? "inline" : "none";
  $("snack").classList.add("show");
  clearTimeout(snackTimer);
  snackTimer = setTimeout(() => $("snack").classList.remove("show"), 5000);
  $("snack-undo").onclick = async () => {
    $("snack").classList.remove("show");
    try { await api({ action:"adminUpdate", password:getPw(), id:undoId, status:"In Process", note:"" }); } catch(e){}
    loadReports(false, false);
  };
}
function toast(msg){ snack(msg, null); }

/* ---------- 5 taps on the login screen (dead space) -> back to main ---------- */
(function(){
  let taps = 0, timer = null;
  $("login").addEventListener("click", e => {
    if (e.target.closest("input, button")) { taps = 0; clearTimeout(timer); return; }
    taps++;
    clearTimeout(timer);
    timer = setTimeout(() => { taps = 0; }, 2000);
    if (taps >= 5) { taps = 0; clearTimeout(timer); window.location.href = HOME_URL; }
  });
})();

/* ---------- Boot: resume session if a password is already stored ---------- */
if (getPw()) loadReports(false); else showLogin("");
</script>
